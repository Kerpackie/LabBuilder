<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Equipment Map Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Custom scrollbar for a cleaner UI */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 overflow-hidden text-gray-800">
    <div id="app" class="flex h-screen w-full font-sans">

        <!-- LEFT PANEL: Visual Control Panel -->
        <div class="w-1/3 bg-white flex flex-col shadow-xl z-20 border-r border-gray-200">
            <!-- Header & File Ops -->
            <div class="p-4 bg-gray-800 text-white flex justify-between items-center">
                <h2 class="font-bold text-lg">Lab Builder</h2>
                <div class="flex gap-2">
                    <label class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1.5 rounded text-xs cursor-pointer transition font-semibold border border-gray-600">
                        Import Backup
                        <input type="file" class="hidden" accept=".json" @change="importJson">
                    </label>
                    <button @click="downloadJson" class="bg-green-600 hover:bg-green-500 text-white px-3 py-1.5 rounded text-xs transition font-semibold">
                        Save Backup
                    </button>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex border-b border-gray-200 bg-gray-50">
                <button @click="activeTab = 'instruments'" :class="['flex-1 py-3 text-sm font-bold border-b-2 transition', activeTab === 'instruments' ? 'border-blue-500 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700']">
                    1. Instruments
                </button>
                <button @click="activeTab = 'links'" :class="['flex-1 py-3 text-sm font-bold border-b-2 transition', activeTab === 'links' ? 'border-blue-500 text-blue-600 bg-white' : 'border-transparent text-gray-500 hover:text-gray-700']">
                    2. Connections
                </button>
            </div>

            <!-- TAB CONTENT: Instruments -->
            <div v-show="activeTab === 'instruments'" class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <div class="space-y-3">
                    <div v-if="data.instruments.length === 0" class="text-center text-gray-400 text-sm py-8 font-medium">
                        No instruments added yet. Click below to start building your lab.
                    </div>

                    <div v-for="(inst, index) in data.instruments" :key="index" class="bg-white p-3 rounded shadow-sm border border-gray-200 relative group">
                        <button @click="removeInstrument(index)" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold opacity-0 group-hover:opacity-100 transition shadow">×</button>

                        <div class="grid grid-cols-12 gap-2">
                            <div class="col-span-5 flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">ID (Unique)</label>
                                <input v-model="inst.id" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500" placeholder="e.g. UPLC01">
                            </div>
                            <div class="col-span-4 flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Row</label>
                                <select v-model="inst.row" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500 bg-white">
                                    <option value="R1">Row 1 (Top)</option>
                                    <option value="R2">Row 2</option>
                                    <option value="R3">Row 3</option>
                                    <option value="R4">Row 4 (Bottom)</option>
                                </select>
                            </div>
                            <div class="col-span-3 flex flex-col">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Slot</label>
                                <select v-model.number="inst.col" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500 bg-white">
                                    <option v-for="n in 7" :value="n-1">{{ n }}</option>
                                </select>
                            </div>
                            <!-- Side by Side Label and Custom Field -->
                            <div class="col-span-6 flex flex-col mt-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Label (\n = new line)</label>
                                <input v-model="inst.label" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500" placeholder="Display Text">
                            </div>
                            <div class="col-span-6 flex flex-col mt-1">
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Custom Data</label>
                                <input v-model="inst.custom" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500" placeholder="e.g. SN: 1234">
                            </div>
                        </div>
                    </div>
                </div>
                <button @click="addInstrument" class="mt-4 w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-600 font-bold py-2 rounded transition shadow-sm">
                    + Add New Instrument
                </button>
            </div>

            <!-- TAB CONTENT: Links -->
            <div v-show="activeTab === 'links'" class="flex-1 overflow-y-auto p-4 bg-gray-50">
                <div class="space-y-3">
                    <div v-if="data.links.length === 0" class="text-center text-gray-400 text-sm py-8 font-medium">
                        No connections yet. Add multiple instruments to create links.
                    </div>

                    <div v-for="(link, index) in data.links" :key="index" class="bg-white p-3 rounded shadow-sm border border-gray-200 flex items-center gap-3">
                        <div class="flex-1 flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Source</label>
                            <select v-model="link.source" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500 bg-white">
                                <option v-for="inst in data.instruments" :value="inst.id">{{ inst.id }}</option>
                            </select>
                        </div>
                        <div class="text-gray-300 font-bold mt-4">➔</div>
                        <div class="flex-1 flex flex-col">
                            <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wide">Target</label>
                            <select v-model="link.target" class="border border-gray-300 p-1.5 rounded text-sm focus:outline-none focus:border-blue-500 bg-white">
                                <option v-for="inst in data.instruments" :value="inst.id">{{ inst.id }}</option>
                            </select>
                        </div>
                        <button @click="removeLink(index)" class="mt-4 text-red-400 hover:text-red-600 font-bold p-1 transition">×</button>
                    </div>
                </div>
                <button @click="addLink" class="mt-4 w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-600 font-bold py-2 rounded transition shadow-sm">
                    + Add Connection
                </button>
            </div>
        </div>

        <!-- RIGHT PANEL: Visual Canvas -->
        <div class="w-2/3 bg-gray-200 flex flex-col relative">
            <div class="p-4 bg-white shadow flex justify-between items-center z-10">
                <h1 class="text-gray-800 font-bold text-xl">Live Map Preview</h1>
                <button @click="downloadPng" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded shadow transition font-bold flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Export Image
                </button>
            </div>

            <!-- Map Container -->
            <div class="flex-1 overflow-auto p-8 flex justify-center items-start">
                <div id="map-canvas" class="relative bg-white shadow-xl border border-gray-300 rounded" style="width: 900px; height: 750px;">

                    <!-- SVG Layer for Bus Lines -->
                    <svg class="absolute top-0 left-0 w-full h-full pointer-events-none z-10">
                        <path v-for="p in routes.paths" :d="p.d" :stroke="p.color" fill="none" stroke-width="3" stroke-dasharray="6,4" />
                        <rect v-for="plug in routes.plugs" :x="plug.x - 4" :y="plug.y - 4" width="8" height="8" :fill="plug.color" />
                    </svg>

                    <!-- The Lab Bench -->
                    <div class="absolute bg-gray-200 border-2 border-gray-400 font-bold text-gray-500 flex items-center justify-center rounded z-0"
                         style="left: 30px; top: 340px; width: 840px; height: 40px;">
                        LAB BENCH
                    </div>

                    <!-- The Instruments -->
                    <div v-for="inst in data.instruments" :key="inst.id"
                         :style="{ left: getX(inst.col) + 'px', top: getY(inst.row) + 'px', width: '90px', height: '75px' }"
                         :class="['absolute rounded border-2 flex flex-col items-center justify-center text-center shadow-sm z-20 p-1',
                                  inst.id.includes('UPLC') ? 'bg-blue-50 border-blue-300' : 'bg-green-50 border-green-300']">
                        <!-- Convert \n in label to actual breaks -->
                        <div class="text-xs font-bold text-gray-800 leading-tight">
                            <template v-for="(line, idx) in inst.label.split('\\n')">
                                {{ line }}<br v-if="idx !== inst.label.split('\\n').length - 1">
                            </template>
                        </div>

                        <!-- Custom Data Field -->
                        <div v-if="inst.custom" class="mt-0.5 text-[9px] text-gray-600 leading-tight font-medium">
                            {{ inst.custom }}
                        </div>

                        <div v-if="getLink(inst.id)" class="mt-0.5 text-[9px] font-bold text-gray-500 leading-tight">
                            [Link: {{ getLink(inst.id) }}]
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Start completely empty for live usage
        const initialData = {
          "instruments": [],
          "links": []
        };

        const app = Vue.createApp({
            data() {
                return {
                    activeTab: 'instruments',
                    data: JSON.parse(JSON.stringify(initialData)),
                    colX: [40, 160, 280, 400, 520, 640, 760],
                    rowY: { "R1": 80, "R2": 180, "R3": 480, "R4": 580 },
                    colors: ['#E6194B', '#3CB44B', '#F58231', '#4363D8', '#911EB4', '#00BCD4', '#F032E6', '#008080', '#9A6324', '#800000']
                };
            },
            computed: {
                instDict() {
                    const dict = {};
                    this.data.instruments.forEach(inst => {
                        dict[inst.id] = {
                            cx: this.colX[inst.col] + 45,
                            top: this.rowY[inst.row],
                            bot: this.rowY[inst.row] + 75,
                            row: inst.row
                        };
                    });
                    return dict;
                },
                routes() {
                    let paths = [];
                    let plugs = [];
                    let sameRowLinks = { "R1": [], "R2": [], "R3": [], "R4": [] };
                    let crossRowLinks = []; // For links between adjacent rows

                    this.data.links.forEach(l => {
                        let src = this.instDict[l.source];
                        let tgt = this.instDict[l.target];
                        if (!src || !tgt) return;

                        if (src.row === tgt.row) {
                            // Same row routing
                            sameRowLinks[src.row].push({ ...l, dist: Math.abs(src.cx - tgt.cx) });
                        } else {
                            // Validate cross-row (must be adjacent to prevent bench-crossing)
                            const pair = [src.row, tgt.row].sort().join('-');
                            if (pair === 'R1-R2' || pair === 'R3-R4') {
                                crossRowLinks.push({ ...l, src, tgt, pair });
                            }
                        }
                    });

                    let c_idx = 0;

                    // 1. Draw Same-Row Links (Outer Bus Routes)
                    for (const [rowName, rLinks] of Object.entries(sameRowLinks)) {
                        rLinks.sort((a, b) => a.dist - b.dist);
                        rLinks.forEach((link, trackIdx) => {
                            let src = this.instDict[link.source];
                            let tgt = this.instDict[link.target];
                            let cx1 = src.cx;
                            let cx2 = tgt.cx;
                            let color = this.colors[c_idx % this.colors.length];
                            c_idx++;

                            let exit_y, track_y;
                            if (rowName === "R1") { exit_y = src.top; track_y = src.top - 20 - (trackIdx * 12); }
                            else if (rowName === "R2") { exit_y = src.bot; track_y = src.bot + 20 + (trackIdx * 12); }
                            else if (rowName === "R3") { exit_y = src.top; track_y = src.top - 20 - (trackIdx * 12); }
                            else if (rowName === "R4") { exit_y = src.bot; track_y = src.bot + 20 + (trackIdx * 12); }

                            paths.push({ d: `M ${cx1} ${exit_y} L ${cx1} ${track_y} L ${cx2} ${track_y} L ${cx2} ${exit_y}`, color });
                            plugs.push({ x: cx1, y: exit_y, color });
                            plugs.push({ x: cx2, y: exit_y, color });
                        });
                    }

                    // 2. Draw Cross-Row Links (Between Adjacent Rows)
                    crossRowLinks.forEach((link, trackIdx) => {
                        let cx1 = link.src.cx;
                        let cx2 = link.tgt.cx;
                        let color = this.colors[c_idx % this.colors.length];
                        c_idx++;

                        let track_y, exit_y1, exit_y2;

                        if (link.pair === 'R1-R2') {
                            track_y = 167.5 + (trackIdx * 4) - ((crossRowLinks.length - 1) * 2);
                            exit_y1 = link.src.row === 'R1' ? link.src.bot : link.src.top;
                            exit_y2 = link.tgt.row === 'R1' ? link.tgt.bot : link.tgt.top;
                        } else if (link.pair === 'R3-R4') {
                            track_y = 567.5 + (trackIdx * 4) - ((crossRowLinks.length - 1) * 2);
                            exit_y1 = link.src.row === 'R3' ? link.src.bot : link.src.top;
                            exit_y2 = link.tgt.row === 'R3' ? link.tgt.bot : link.tgt.top;
                        }

                        if (cx1 === cx2) {
                            // Straight line down if in the exact same column (1,1 to 2,1)
                            paths.push({ d: `M ${cx1} ${exit_y1} L ${cx2} ${exit_y2}`, color });
                        } else {
                            // Horizontal routing track if offset (1,1 to 2,2)
                            paths.push({ d: `M ${cx1} ${exit_y1} L ${cx1} ${track_y} L ${cx2} ${track_y} L ${cx2} ${exit_y2}`, color });
                        }

                        plugs.push({ x: cx1, y: exit_y1, color });
                        plugs.push({ x: cx2, y: exit_y2, color });
                    });

                    return { paths, plugs };
                }
            },
            methods: {
                getX(col) { return this.colX[col]; },
                getY(row) { return this.rowY[row]; },
                getLink(id) {
                    const link = this.data.links.find(l => l.source === id || l.target === id);
                    return link ? (link.source === id ? link.target : link.source) : null;
                },
                addInstrument() {
                    const newId = "INST" + (this.data.instruments.length + 1).toString().padStart(2, '0');
                    this.data.instruments.push({ id: newId, label: newId, custom: "", row: "R1", col: 0 });
                    setTimeout(() => {
                        const container = this.$el.querySelector('.overflow-y-auto');
                        container.scrollTop = container.scrollHeight;
                    }, 50);
                },
                removeInstrument(index) {
                    const removedId = this.data.instruments[index].id;
                    this.data.instruments.splice(index, 1);
                    this.data.links = this.data.links.filter(l => l.source !== removedId && l.target !== removedId);
                },
                addLink() {
                    if (this.data.instruments.length >= 2) {
                        this.data.links.push({ source: this.data.instruments[0].id, target: this.data.instruments[1].id });
                    }
                },
                removeLink(index) {
                    this.data.links.splice(index, 1);
                },
                downloadJson() {
                    const blob = new Blob([JSON.stringify(this.data, null, 2)], { type: "application/json" });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = "Lab_Map_Backup.json";
                    a.click();
                },
                importJson(event) {
                    const file = event.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            try {
                                this.data = JSON.parse(e.target.result);
                            } catch(err) {
                                alert("Failed to import. Invalid file format.");
                            }
                        };
                        reader.readAsText(file);
                    }
                },
                downloadPng() {
                    const el = document.getElementById('map-canvas');
                    html2canvas(el, { scale: 3 }).then(canvas => {
                        const a = document.createElement('a');
                        a.href = canvas.toDataURL("image/png");
                        a.download = "Lab_Map_Design.png";
                        a.click();
                    });
                }
            }
        });
        app.mount('#app');
    </script>
</body>
</html>
